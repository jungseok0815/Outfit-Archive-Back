name: Deploy Server to EC2

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-spring:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Spring Boot 이미지 태그 설정
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jungseok0815/outfit-archive-back
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Spring Boot 이미지 빌드 & GHCR Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            JASYPT_ENCRYPTOR_PASSWORD=${{ secrets.JASYPT_PASSWORD }}

  build-fastapi:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: FastAPI 이미지 태그 설정
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jungseok0815/outfit-archive-back/recommend
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: FastAPI 이미지 빌드 & GHCR Push
        uses: docker/build-push-action@v5
        with:
          context: ./outfit-recommend-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-spring, build-fastapi]

    steps:
      - name: EC2 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            # GHCR 로그인
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 최신 이미지 pull
            docker pull ghcr.io/jungseok0815/outfit-archive-back:latest
            docker pull ghcr.io/jungseok0815/outfit-archive-back/recommend:latest

            # 컨테이너 간 통신용 네트워크 생성 (이미 있으면 무시)
            docker network create app-network || true

            # Redis 실행 (없을 때만)
            if [ ! "$(docker ps -q -f name=redis)" ]; then
              docker run -d \
                --name redis \
                --network app-network \
                --restart unless-stopped \
                redis:7-alpine
            fi

            # Spring Boot 컨테이너 교체
            docker stop app || true
            docker rm app || true
            docker run -d \
              --name app \
              --network app-network \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e JASYPT_ENCRYPTOR_PASSWORD=${{ secrets.JASYPT_PASSWORD }} \
              -e SPRING_DATA_REDIS_HOST=redis \
              ghcr.io/jungseok0815/outfit-archive-back:latest

            # FastAPI 컨테이너 교체
            docker stop recommend || true
            docker rm recommend || true
            docker run -d \
              --name recommend \
              --network app-network \
              --restart unless-stopped \
              -p 8000:8000 \
              ghcr.io/jungseok0815/outfit-archive-back/recommend:latest

            # 오래된 이미지 정리
            docker image prune -f

            echo "배포 완료"
